; JsonTools settings file

[JSON Parser]
; Parse "yyyy-mm-dd dates" and "yyyy-MM-dd hh:mm:ss.sss" datetimes as the appropriate type.
allow_datetimes=False
; Ignore JavaScript comments in JSON. If false, comments cause the parser to error out.
allow_javascript_comments=False
; Parse NaN and Infinity in JSON. If false, those raise an error.
allow_nan_inf=True
; Allow use of ' as well as " for quoting strings.
allow_singlequoted_str=False
; Track the locations where any JSON syntax errors were found
linting=False

[Tree View]
; The longest length of a JSON array or object that gets its full tree added to the tree view. Larger files get only some of the direct children of the root added to the tree.
max_json_length_full_tree=10000
; The largest size in megabytes of a JSON file that gets its full tree added to the tree view. Larger files get only the direct children of the root added to the tree. Also, files bigger than this limit don't get colorized automatically.
max_size_full_tree_MB=4
; Whether or not to use the tree view at all.
use_tree=True

[JSON formatting]
; The indentation between levels of JSON when pretty-printing
indent_pretty_print=4
; If true, using the 'Compress JSON' plugin command will remove ALL unnecessary whitespace from the JSON. Otherwise, it will leave after the colon in objects and after the comma in both objects and arrays
minimal_whitespace_compression=False
; How JSON is pretty printed.
; Google style (default):
; {
;     "a": [
;         1,
;         [
;             2
;         ]
;     ]
; }
; 
; Whitesmith style:
; {
; "a":
;     [
;     1,
;         [
;         2
;         ]
;     ]
; }
pretty_print_style=Whitesmith
; Sort the keys of objects alphabetically when pretty-printing or compressing
sort_keys=False

[Miscellaneous]
; The style of key to use when getting the path or key/index of a node or line
key_style=RemesPath

[Grep and API requests]
; How many threads to use for parsing JSON files obtained by JsonGrep and API requester
max_threads_parsing=4

[Styling]
; Use the same colors as the editor window for the tree viewer?
use_npp_styling=True

[Random JSON]
; Use extended ASCII characters (e.g., , ñ) in strings?
extended_ascii_strings=False
; Maximum length of random arrays, unless otherwise specified by the "maxItems" keyword
maxArrayLength=10
; Minimum length of random arrays, unless otherwise specified by the "minItems" keyword
minArrayLength=0
